name: Build & Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Inject Alpha Vantage API Key
        run: |
          sed -i "s/__AV_API_KEY__/${{ secrets.AV_API_KEY }}/g" index.html
          echo "API key injected into index.html"

      - name: Verify injection
        run: |
          if grep -q "__AV_API_KEY__" index.html; then
            echo "ERROR: Placeholder was not replaced. Check that AV_API_KEY secret is set."
            exit 1
          else
            echo "Placeholder successfully replaced."
          fi

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: site
          path: index.html

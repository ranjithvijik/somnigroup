name: SGI Dashboard QA

on:
  push:
    branches: ["main", "develop"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ──────────────────────────────────────────────────────────────────────────
  # Job 1: Full test suite (runs on Node.js 18, 20, and 22)
  # ──────────────────────────────────────────────────────────────────────────
  test:
    name: "Test Suite (Node.js ${{ matrix.node-version }})"
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        node-version: ["18", "20", "22"]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: "npm"

      - name: Install dependencies
        run: npm install

      - name: Run QA orchestrator
        run: node run_tests.js --out QA-REPORT-node${{ matrix.node-version }}.md

      - name: Upload QA report artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: qa-report-node${{ matrix.node-version }}
          path: QA-REPORT-node${{ matrix.node-version }}.md
          retention-days: 30

      - name: Post report to Actions summary
        if: always()
        run: |
          echo "## QA Results — Node.js ${{ matrix.node-version }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          cat QA-REPORT-node${{ matrix.node-version }}.md >> $GITHUB_STEP_SUMMARY

  # ──────────────────────────────────────────────────────────────────────────
  # Job 2: Commit canonical QA-REPORT.md back to main after a push
  # ──────────────────────────────────────────────────────────────────────────
  commit-report:
    name: "Commit QA Report"
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm install

      - name: Regenerate canonical QA-REPORT.md
        run: node run_tests.js --out QA-REPORT.md

      - name: Commit QA-REPORT.md
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "ci: update QA-REPORT.md [skip ci]"
          file_pattern: "QA-REPORT.md"
          commit_user_name: "github-actions[bot]"
          commit_user_email: "github-actions[bot]@users.noreply.github.com"
        continue-on-error: true   # no-op when QA-REPORT.md is already up to date
